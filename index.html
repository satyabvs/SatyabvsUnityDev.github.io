<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.V. Satyanarayana | Lead XR Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #00F5FF; /* Futuristic XR Cyan */
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --army-green: #4b5320;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1500') center/cover;
            border-bottom: 4px solid var(--primary-orange);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--primary-orange);
            font-weight: 600;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .hero-desc { max-width: 700px; font-size: 1.1rem; color: #bbb; margin-top: 15px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }

        h2.section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            border-left: 6px solid var(--primary-orange);
            padding-left: 20px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 4px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            border-color: var(--primary-orange);
            transform: translateY(-8px);
            background: rgba(0, 245, 255, 0.06);
        }

        .role-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--primary-orange);
            color: black;
            padding: 5px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .project-card h3 { 
            font-family: 'Oswald', sans-serif; 
            color: white; 
            font-size: 1.6rem; 
            margin: 15px 0; 
        }

        .tag { 
            color: var(--primary-orange); 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        ul { padding-left: 18px; color: #aaa; font-size: 0.95rem; }
        li { margin-bottom: 8px; }

        .video-trigger {
            display: inline-block;
            margin-top: 15px;
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .enterprise-section { background: #111; padding: 60px 0; }

        .client-pill {
            display: inline-block;
            border: 1px solid #333;
            padding: 8px 20px;
            margin: 5px;
            border-radius: 50px;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .client-pill:hover { 
            border-color: var(--primary-orange); 
            background: var(--primary-orange); 
            color: black; 
        }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(8px);
        }

        .modal-content { 
            position: relative; 
            margin: 5% auto; 
            width: 90%; 
            max-width: 900px; 
            border: 1px solid var(--primary-orange); 
        }

        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
        }

        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }

        .close { 
            color: white; 
            position: absolute; 
            top: -40px; 
            right: 0; 
            font-size: 25px; 
            cursor: pointer; 
        }

        footer { 
            text-align: center; 
            padding: 40px; 
            border-top: 1px solid #222; 
            font-size: 0.9rem; 
            color: #666; 
        }

        @media (max-width: 768px) { 
            .project-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideo()">&times; CLOSE MISSION LOG</span>
            <div class="video-container">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <header>
        <p class="subtitle">LEAD XR DEVELOPER</p>
        <h1>B.V. SATYANARAYANA</h1>
        <p class="hero-desc">Architecting mission-critical VR simulations for the Indian Army and high-fidelity enterprise solutions for global brands.</p>
        <a href="#projects" style="margin-top: 30px; background: var(--primary-orange); color: black; padding: 15px 35px; text-decoration: none; font-weight: bold; border-radius: 2px;">COMMENCE PORTFOLIO REVIEW</a>
    </header>

    <!-- Rest of HTML remains exactly the same -->

</body>
</html>
